name: "On the way"
description: "Jejak pesanan penghantaran & tunggangan secara langsung melalui Telegram + sensor HA (kini menyokong Grab)"
version: "2.0.0"
slug: "grab_tracker"
url: "https://github.com/anas-ivs/HA-On-The-Way"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
options:
  telegram_bot_token: ""
  ha_token: ""
  ha_url: "http://homeassistant:8123"
  notify_chat_id: ""
  allowed_chat_ids: ""
  poll_interval_prepare: 120
  poll_interval_executing: 30
  poll_interval_default: 180
  max_tracking_timeout: 7200
  max_concurrent_orders: 5
  history_limit: 50
  log_level: info
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
schema:
  telegram_bot_token: str
  ha_token: str
  ha_url: str
  notify_chat_id: str?
  allowed_chat_ids: str?
  poll_interval_prepare: int
  poll_interval_executing: int
  poll_interval_default: int
  max_tracking_timeout: int
  max_concurrent_orders: int
  history_limit: int
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  mqtt_host: str?
  mqtt_port: int?
  mqtt_username: str?
  mqtt_password: password?
services:
  - mqtt:want
ingress: true
ingress_port: 8099
panel_icon: "mdi:moped"
panel_title: "On the way"
map:
  - data:rw
