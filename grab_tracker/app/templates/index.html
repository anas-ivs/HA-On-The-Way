<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On the way</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #4f46e5; color: white; padding: 1rem 1.5rem; display: flex; align-items: baseline; justify-content: space-between; }
    header h1 { font-size: 1.25rem; }
    header .version { font-size: .8rem; opacity: .85; }
    main { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    th { background: #4f46e5; color: white; text-align: left; padding: .6rem 1rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: .65rem 1rem; border-bottom: 1px solid #eee; font-size: .9rem; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr.order-row:hover { background: #eef0fe; cursor: pointer; }
    .badge { display: inline-block; padding: .2rem .5rem; border-radius: 12px; font-size: .75rem; font-weight: 600; }
    .badge-active { background: #e8eafd; color: #4f46e5; }
    .badge-done { background: #eee; color: #555; }
    .badge-cancelled { background: #fee; color: #c00; }
    .events-row td { padding: 0; background: #fafafa; }
    .events-inner { padding: .75rem 1rem; display: none; }
    .events-inner.open { display: block; }
    .timeline { list-style: none; padding-left: 1rem; border-left: 2px solid #4f46e5; }
    .timeline li { position: relative; padding: .3rem 0 .3rem 1rem; font-size: .82rem; }
    .timeline li::before { content: ''; position: absolute; left: -5px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: #4f46e5; }
    .timeline .ts { color: #888; font-size: .75rem; margin-left: .5rem; }
    .no-orders { text-align: center; padding: 2rem; color: #888; }
    .refresh-note { font-size: .75rem; color: #888; margin-top: .75rem; text-align: right; }
    .settings { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 1.25rem; padding: 0; }
    .settings > summary { list-style: none; cursor: pointer; padding: .85rem 1.25rem; font-size: .9rem; text-transform: uppercase; letter-spacing: .05em; color: #4f46e5; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
    .settings > summary::-webkit-details-marker { display: none; }
    .settings > summary::after { content: '▸'; margin-left: auto; transition: transform .15s ease; }
    .settings[open] > summary::after { transform: rotate(90deg); }
    .settings .settings-body { padding: 0 1.25rem 1rem; }
    .settings .field { display: flex; align-items: center; gap: .6rem; margin: .5rem 0; font-size: .88rem; }
    .settings .field label { flex: 1; }
    .settings input[type="number"] { width: 6rem; padding: .3rem .4rem; border: 1px solid #ccc; border-radius: 4px; }
    .settings button { background: #4f46e5; color: white; border: none; padding: .45rem 1rem; border-radius: 6px; font-size: .85rem; cursor: pointer; }
    .settings button:disabled { opacity: .5; cursor: default; }
    .settings .saved { color: #4f46e5; font-size: .8rem; margin-left: .6rem; }
    .settings .hint { color: #888; font-size: .75rem; }
    .active { margin-bottom: 1.25rem; }
    .active h2 { font-size: .9rem; text-transform: uppercase; letter-spacing: .05em; color: #4f46e5; margin-bottom: .6rem; }
    .acard { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: .7rem 1rem; margin-bottom: .6rem; display: flex; align-items: center; gap: .75rem; }
    .acard .info { flex: 1; font-size: .88rem; }
    .acard .slot { display: inline-block; background: #4f46e5; color: white; border-radius: 6px; padding: .1rem .5rem; font-size: .75rem; font-weight: 600; margin-right: .4rem; }
    .acard .sub { color: #888; font-size: .78rem; }
    .acard button { border: none; border-radius: 6px; padding: .4rem .7rem; font-size: .8rem; cursor: pointer; }
    .acard .refresh { background: #e8eafd; color: #3730a3; }
    .acard .kill { background: #fee; color: #c00; }
    .active .none { color: #888; font-size: .85rem; padding: .3rem 0; }
    .row-del { background: transparent; border: none; cursor: pointer; font-size: 1rem; opacity: .55; }
    .row-del:hover { opacity: 1; }
    .track { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 1.25rem; padding: 0; }
    .track > summary { list-style: none; cursor: pointer; padding: .85rem 1.25rem; font-size: .9rem; text-transform: uppercase; letter-spacing: .05em; color: #4f46e5; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
    .track > summary::-webkit-details-marker { display: none; }
    .track > summary::after { content: '▸'; margin-left: auto; transition: transform .15s ease; }
    .track[open] > summary::after { transform: rotate(90deg); }
    .track .track-body { padding: 0 1.25rem 1rem; }
    .track .field { display: flex; gap: .6rem; }
    .track input[type="text"] { flex: 1; padding: .5rem .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: .9rem; }
    .track button { background: #4f46e5; color: white; border: none; padding: .5rem 1.1rem; border-radius: 6px; font-size: .9rem; cursor: pointer; }
    .track button:disabled { opacity: .45; cursor: default; }
    .track .msg { font-size: .82rem; margin-top: .5rem; min-height: 1em; }
    .track .msg.ok { color: #3730a3; }
    .track .msg.err { color: #c00; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .table-wrap table { box-shadow: none; }
    /* Narrow / mobile layout */
    @media (max-width: 560px) {
      main { padding: 1rem .75rem; }
      header { padding: .85rem 1rem; }
      header h1 { font-size: 1.05rem; }
      table { min-width: 620px; }            /* keep columns readable; wrapper scrolls */
      .track .field { flex-wrap: wrap; }
      .track button { flex: 1 1 100%; }
      .acard { flex-wrap: wrap; }
      .acard .info { flex: 1 1 100%; margin-bottom: .45rem; }
      .acard button { flex: 1; }
      .settings .field { flex-wrap: wrap; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header><h1>🛵 On the way</h1><span class="version" id="version">v…</span></header>
  <main>
    <details class="track" open>
      <summary>➕ Jejak Pesanan Baharu</summary>
      <div class="track-body">
        <div class="field">
          <input type="text" id="track-url" placeholder="Tampal pautan kongsi pesanan di sini">
          <button id="track-btn" disabled>Jejak</button>
        </div>
        <div class="msg" id="track-msg"></div>
      </div>
    </details>

    <section class="active">
      <h2>Penjejakan Aktif</h2>
      <div id="active-list"><div class="none">Memuatkan…</div></div>
    </section>

    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tempahan</th>
          <th>Dari</th>
          <th>Ke</th>
          <th>Pemandu</th>
          <th>Status</th>
          <th>Dimula</th>
          <th>Selesai</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="8" class="no-orders">Memuatkan…</td></tr>
      </tbody>
    </table>
    </div>
    <p class="refresh-note">Dimuat semula automatik setiap 30s</p>

    <details class="settings">
      <summary>⚙️ Tetapan</summary>
      <div class="settings-body">
        <div class="field">
          <label for="send-loc">Hantar pin lokasi pemandu ke Telegram</label>
          <input type="checkbox" id="send-loc">
        </div>
        <div class="field">
          <label for="debug-msg">Hantar mesej nyahpepijat mentah ke Telegram</label>
          <input type="checkbox" id="debug-msg">
        </div>
        <div class="field">
          <label for="min-move">Pergerakan minimum pemandu sebelum pin baharu <span class="hint">(meter, 0 = setiap semakan)</span></label>
          <input type="number" id="min-move" min="0" step="10" value="0">
        </div>
        <div>
          <button id="save-settings">Simpan tetapan</button>
          <span class="saved" id="settings-saved" style="display:none">✓ Disimpan</span>
        </div>
      </div>
    </details>
  </main>

  <script>
    // Use relative URLs so requests stay under the HA ingress path prefix.
    function statusBadge(status, isTerminal) {
      const cls = isTerminal
        ? (status === 'Dibatalkan' ? 'badge-cancelled' : 'badge-done')
        : 'badge-active';
      return `<span class="badge ${cls}">${status}</span>`;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString();
    }

    async function loadEvents(orderId, container) {
      if (container.dataset.loaded) {
        container.classList.toggle('open');
        return;
      }
      const res = await fetch(`api/orders/${orderId}/events`);
      const events = await res.json();
      const ul = document.createElement('ul');
      ul.className = 'timeline';
      events.forEach(e => {
        const li = document.createElement('li');
        const eta = e.eta_minutes != null ? ` · Anggaran tiba ${e.eta_minutes} min` : '';
        li.innerHTML = `<strong>${e.friendly_status}</strong>${eta}<span class="ts">${fmtDate(e.recorded_at)}</span>`;
        ul.appendChild(li);
      });
      if (!events.length) ul.innerHTML = '<li>Tiada acara lagi</li>';
      container.appendChild(ul);
      container.dataset.loaded = '1';
      container.classList.add('open');
    }

    async function loadOrders() {
      try {
        const res = await fetch('api/orders');
        const orders = await res.json();
        const tbody = document.getElementById('orders-body');
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="8" class="no-orders">Tiada pesanan dijejak lagi</td></tr>';
          return;
        }
        tbody.innerHTML = '';
        orders.forEach(o => {
          const row = document.createElement('tr');
          row.className = 'order-row';
          row.innerHTML = `
            <td>${o.booking_code || '—'}</td>
            <td>${o.pickup_name || '—'}</td>
            <td>${o.dropoff_name || '—'}</td>
            <td>${o.driver_name || '—'}<br><small>${o.vehicle || ''}</small></td>
            <td>${statusBadge(o.friendly_status, o.is_terminal)}</td>
            <td>${fmtDate(o.started_at)}</td>
            <td>${fmtDate(o.completed_at)}</td>
            <td><button class="row-del" title="Padam">🗑</button></td>
          `;
          const evRow = document.createElement('tr');
          evRow.className = 'events-row';
          const evTd = document.createElement('td');
          evTd.colSpan = 8;
          const evInner = document.createElement('div');
          evInner.className = 'events-inner';
          evTd.appendChild(evInner);
          evRow.appendChild(evTd);

          row.addEventListener('click', () => loadEvents(o.id, evInner));
          row.querySelector('.row-del').addEventListener('click', (ev) => {
            ev.stopPropagation();
            if (confirm('Padam pesanan ini dan sejarahnya?')) deleteOrder(o.id);
          });
          tbody.appendChild(row);
          tbody.appendChild(evRow);
        });
      } catch (err) {
        document.getElementById('orders-body').innerHTML =
          `<tr><td colspan="8" class="no-orders">Gagal memuatkan pesanan: ${err}</td></tr>`;
      }
    }

    async function deleteOrder(orderId) {
      try {
        await fetch(`api/orders/${orderId}`, { method: 'DELETE' });
        setTimeout(() => { loadOrders(); loadActive(); }, 400);
      } catch (err) {
        alert('Gagal memadam pesanan: ' + err);
      }
    }

    async function loadSettings() {
      try {
        const res = await fetch('api/settings');
        const s = await res.json();
        document.getElementById('send-loc').checked = s.send_driver_location === '1';
        document.getElementById('debug-msg').checked = s.debug_messages === '1';
        document.getElementById('min-move').value = s.location_min_move_meters ?? '0';
      } catch (err) {
        console.error('Failed to load settings', err);
      }
    }

    async function saveSettings() {
      const btn = document.getElementById('save-settings');
      btn.disabled = true;
      try {
        await fetch('api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            send_driver_location: document.getElementById('send-loc').checked ? '1' : '0',
            debug_messages: document.getElementById('debug-msg').checked ? '1' : '0',
            location_min_move_meters: String(document.getElementById('min-move').value || '0'),
          }),
        });
        const saved = document.getElementById('settings-saved');
        saved.style.display = 'inline';
        setTimeout(() => { saved.style.display = 'none'; }, 2000);
      } catch (err) {
        alert('Gagal menyimpan tetapan: ' + err);
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('save-settings').addEventListener('click', saveSettings);

    const trackUrl = document.getElementById('track-url');
    const trackBtn = document.getElementById('track-btn');
    const trackMsg = document.getElementById('track-msg');

    // Rule: enable Track once the input looks like a link; the server then classifies
    // it (Grab → track, known-other → "not supported", else → invalid).
    function validateTrackUrl() {
      const v = trackUrl.value.trim().toLowerCase();
      trackBtn.disabled = !(v.includes('http') || v.includes('.'));
    }
    trackUrl.addEventListener('input', validateTrackUrl);

    async function submitTrack() {
      const url = trackUrl.value.trim();
      if (!url) return;
      trackBtn.disabled = true;
      trackMsg.textContent = 'Memulakan…';
      trackMsg.className = 'msg';
      try {
        const res = await fetch('api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        trackMsg.textContent = data.message || (data.ok ? 'Penjejakan dimulakan.' : 'Gagal.');
        trackMsg.className = 'msg ' + (data.ok ? 'ok' : 'err');
        if (data.ok) { trackUrl.value = ''; loadActive(); loadOrders(); }
      } catch (err) {
        trackMsg.textContent = 'Permintaan gagal: ' + err;
        trackMsg.className = 'msg err';
      } finally {
        validateTrackUrl();
      }
    }
    trackBtn.addEventListener('click', submitTrack);

    async function postAction(token, action) {
      await fetch(`api/active/${encodeURIComponent(token)}/${action}`, { method: 'POST' });
      setTimeout(() => { loadActive(); loadOrders(); }, 600);
    }

    async function loadActive() {
      const wrap = document.getElementById('active-list');
      try {
        const res = await fetch('api/active');
        const items = await res.json();
        if (!items.length) {
          wrap.innerHTML = '<div class="none">Tiada pesanan sedang dijejak.</div>';
          return;
        }
        wrap.innerHTML = '';
        items.forEach(i => {
          const card = document.createElement('div');
          card.className = 'acard';
          const sub = [i.booking_code ? `Tempahan ${i.booking_code}` : null,
                       i.dropoff ? `→ ${i.dropoff}` : null,
                       `semakan #${i.poll_count || 0}`].filter(Boolean).join(' · ');
          card.innerHTML = `
            <div class="info">
              <span class="slot">Slot ${i.slot ?? '—'}</span>${i.status || '—'}
              <div class="sub">${sub}</div>
            </div>
            <button class="refresh">Muat semula</button>
            <button class="kill">Henti</button>`;
          card.querySelector('.refresh').addEventListener('click', () => postAction(i.token, 'refresh'));
          card.querySelector('.kill').addEventListener('click', () => {
            if (confirm('Hentikan penjejakan pesanan ini?')) postAction(i.token, 'kill');
          });
          wrap.appendChild(card);
        });
      } catch (err) {
        wrap.innerHTML = `<div class="none">Gagal memuatkan penjejakan aktif: ${err}</div>`;
      }
    }

    async function loadVersion() {
      try {
        const res = await fetch('api/version');
        const { version } = await res.json();
        document.getElementById('version').textContent = 'v' + version;
      } catch (err) {
        document.getElementById('version').textContent = '';
      }
    }

    loadVersion();
    loadSettings();
    loadActive();
    loadOrders();
    setInterval(loadActive, 15000);
    setInterval(loadOrders, 30000);
  </script>
</body>
</html>
